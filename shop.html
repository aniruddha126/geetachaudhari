<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop | GeetaChaudhari</title>

<style>

body {
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#FFF5E1;
}

/* MENU */
.menu {
background:#D4AF37;
text-align:center;
padding:15px;
}

.menu a {
margin:0 20px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* PAGE TITLE */
.page-title {
text-align:center;
padding:30px 20px 10px;
}

.page-title h1 {
color:#800000;
}

/* PRODUCTS */
.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card {
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
position:relative;
}

.card img {
width:100%;
height:320px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

/* NEW TAG */
.new-tag {
position:absolute;
top:10px;
left:10px;
background:#800000;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.price {
font-weight:bold;
margin-top:5px;
}

/* STOCK */
.stock {
font-size:13px;
margin-top:5px;
}

.in-stock {
color:green;
}

.out-stock {
color:red;
}

.whatsapp {
background:#25D366;
color:white;
padding:10px 15px;
display:inline-block;
margin-top:10px;
border-radius:6px;
text-decoration:none;
}

/* MODAL */
.modal {
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
}

.modal-content {
background:white;
margin:5% auto;
padding:20px;
border-radius:10px;
width:90%;
max-width:600px;
text-align:center;
}

.modal-img {
width:100%;
max-height:400px;
object-fit:contain;
border-radius:8px;
}

.thumbnail-row {
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.thumbnail-row img {
width:60px;
height:60px;
object-fit:cover;
cursor:pointer;
border-radius:5px;
}

.close {
position:absolute;
top:20px;
right:40px;
color:white;
font-size:40px;
font-weight:bold;
cursor:pointer;
}

/* SIZE SELECT */
.size-select {
margin-top:15px;
padding:8px;
}

.description {
margin-top:10px;
font-size:14px;
color:#555;
}

/* FLOAT WHATSAPP */
.float-whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */
.footer {
background:#800000;
color:white;
text-align:center;
padding:15px;
}

</style>

<script>

function openModal(src, desc) {

let modal=document.getElementById("modal");
let modalImg=document.getElementById("modal-img");
let modalDesc=document.getElementById("modal-desc");

modal.style.display="block";
modalImg.src=src;
modalDesc.innerText=desc;

}

function changeImage(src) {
document.getElementById("modal-img").src=src;
}

function closeModal() {
document.getElementById("modal").style.display="none";
}

</script>

</head>

<body>

<!-- MENU -->

<div class="menu">
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>

<!-- TITLE -->

<div class="page-title">
<h1>Our Collection</h1>
<p>Browse our handcrafted ethnic wear</p>
</div>

<!-- PRODUCTS -->

<div class="products">

<div class="card">
<span class="new-tag">NEW</span>
<img src="saree.jpg"
onclick="openModal('saree.jpg','Elegant lotus-inspired saree perfect for festive wear.')">
<h3>Lotus Saree</h3>
<div class="price">₹2499</div>
<div class="stock in-stock">In Stock</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">Order</a>
</div>

<div class="card">
<img src="salwar.jpg"
onclick="openModal('salwar.jpg','Comfortable salwar suit suitable for daily and festive wear.')">
<h3>Salwar Suit</h3>
<div class="price">₹1999</div>
<div class="stock in-stock">In Stock</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">Order</a>
</div>

<div class="card">
<img src="lehenga.jpg"
onclick="openModal('lehenga.jpg','Royal lehenga designed for weddings and grand occasions.')">
<h3>Royal Lehenga</h3>
<div class="price">₹4999</div>
<div class="stock out-stock">Limited Stock</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">Order</a>
</div>

<div class="card">
<img src="kurti.jpg"
onclick="openModal('kurti.jpg','Daily wear kurti offering comfort and style.')">
<h3>Daily Kurti</h3>
<div class="price">₹999</div>
<div class="stock in-stock">In Stock</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">Order</a>
</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<span class="close" onclick="closeModal()">&times;</span>

<div class="modal-content">

<img class="modal-img" id="modal-img">

<div class="thumbnail-row">
<img src="saree.jpg" onclick="changeImage(this.src)">
<img src="salwar.jpg" onclick="changeImage(this.src)">
<img src="lehenga.jpg" onclick="changeImage(this.src)">
<img src="kurti.jpg" onclick="changeImage(this.src)">
</div>

<select class="size-select">
<option>Select Size</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<p id="modal-desc" class="description"></p>

</div>

</div>

<!-- FLOAT WHATSAPP -->

<a class="float-whatsapp"
href="https://wa.me/919420873535"
target="_blank">
WhatsApp
</a>

<!-- FOOTER -->

<div class="footer">
© 2026 GeetaChaudhari
</div>

</body>
</html>
