<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeetaChaudhari | Shop</title>

<style>

body {
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#FFF5E1;
}

/* BANNER */
.banner img {
width:100%;
display:block;
}

/* MENU */
.menu {
background:#D4AF37;
text-align:center;
padding:15px;
}

.menu a {
margin:0 20px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* CATEGORY FILTER */
.filters {
text-align:center;
padding:20px;
}

.filters button {
padding:10px 16px;
margin:5px;
border:none;
background:#800000;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PRODUCTS */
.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card {
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img {
width:100%;
height:320px;
object-fit:cover;
border-radius:8px;
}

.price {
font-weight:bold;
}

.whatsapp {
background:#25D366;
color:white;
padding:10px 15px;
display:inline-block;
margin-top:10px;
border-radius:6px;
text-decoration:none;
}

/* FLOATING WHATSAPP */
.float-whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* INSTAGRAM */
.instagram {
text-align:center;
padding:30px;
}

.instagram a {
color:#800000;
font-weight:bold;
text-decoration:none;
}

/* FOOTER */
.footer {
background:#800000;
color:white;
text-align:center;
padding:15px;
}

</style>

<script>

function filterProducts(category) {
let cards = document.querySelectorAll('.card');

cards.forEach(card => {
if(category === 'all') {
card.style.display = 'block';
}
else if(card.classList.contains(category)) {
card.style.display = 'block';
}
else {
card.style.display = 'none';
}
});
}

</script>

</head>

<body>

<!-- BANNER -->
<div class="banner">
<img src="banner.jpg">
</div>

<!-- MENU -->

<a href="contact.html">Contact</a>
</div>

<!-- FILTERS -->
<div class="filters">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('saree')">Saree</button>
<button onclick="filterProducts('salwar')">Salwar</button>
<button onclick="filterProducts('lehenga')">Lehenga</button>
<button onclick="filterProducts('kurti')">Kurti</button>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card saree">
<img src="saree.jpg">
<h3>Lotus Saree</h3>
<div class="price">₹2499</div>
<a class="whatsapp" href="https://wa.me/919420873535">Order</a>
</div>

<div class="card salwar">
<img src="salwar.jpg">
<h3>Salwar Suit</h3>
<div class="price">₹1999</div>

</div>

<div class="card lehenga">

</div>

<div class="card kurti">
<img src="kurti.jpg">

<div class="price">₹999</div>
<a class="whatsapp" href="https://wa.me/919420873535">Order</a>
</div>

</div>

<!-- INSTAGRAM -->
<div class="instagram">
<p>Follow us on Instagram:</p>
<a href="https://instagram.com/geetachaudhari_official" target="_blank">
@geetachaudhari_official
</a>
</div>

<!-- FLOATING WHATSAPP -->

WhatsApp

<div class="footer">

</div>

</body>
</html>
