<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop | GeetaChaudhari</title>

<style>

body {
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#FFF5E1;
}

/* MENU */

.menu {
background:#D4AF37;
text-align:center;
padding:15px;
}

.menu a {
margin:0 20px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* PAGE TITLE */

.page-title {
text-align:center;
padding:30px 20px 10px;
}

.page-title h1 {
color:#800000;
}

/* FILTER BUTTONS */

.filters {
text-align:center;
padding:20px;
}

.filters button {
padding:10px 16px;
margin:5px;
border:none;
background:#800000;
color:white;
border-radius:6px;
cursor:pointer;
}

/* PRODUCTS */

.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card {
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.card img {
width:100%;
height:320px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.price {
font-weight:bold;
margin-top:5px;
}

.whatsapp {
background:#25D366;
color:white;
padding:10px 15px;
display:inline-block;
margin-top:10px;
border-radius:6px;
text-decoration:none;
}

/* POPUP MODAL */

.modal {
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
}

.modal-content {
display:block;
margin:auto;
margin-top:5%;
max-width:80%;
max-height:80%;
}

.close {
position:absolute;
top:20px;
right:40px;
color:white;
font-size:40px;
font-weight:bold;
cursor:pointer;
}

/* FLOAT WHATSAPP */

.float-whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

.footer {
background:#800000;
color:white;
text-align:center;
padding:15px;
}

</style>

<script>

/* FILTER */

function filterProducts(category) {

let cards = document.querySelectorAll('.card');

cards.forEach(card => {

if(category === 'all') {

card.style.display = 'block';

}

else if(card.classList.contains(category)) {

card.style.display = 'block';

}

else {

card.style.display = 'none';

}

});

}

/* IMAGE POPUP */

function openModal(src) {

document.getElementById("modal").style.display="block";

document.getElementById("modal-img").src=src;

}

function closeModal() {

document.getElementById("modal").style.display="none";

}

</script>

</head>

<body>

<!-- MENU -->

<div class="menu">

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</div>

<!-- TITLE -->

<div class="page-title">

<h1>Our Collection</h1>

<p>Browse our handcrafted ethnic wear</p>

</div>

<!-- FILTERS -->

<div class="filters">

<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('saree')">Saree</button>
<button onclick="filterProducts('salwar')">Salwar</button>
<button onclick="filterProducts('lehenga')">Lehenga</button>
<button onclick="filterProducts('kurti')">Kurti</button>

</div>

<!-- PRODUCTS -->

<div class="products">

<div class="card saree">
<img src="saree.jpg"
onclick="openModal(this.src)">
<h3>Lotus Saree</h3>
<div class="price">₹2499</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">
Order
</a>
</div>

<div class="card salwar">
<img src="salwar.jpg"
onclick="openModal(this.src)">
<h3>Salwar Suit</h3>
<div class="price">₹1999</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">
Order
</a>
</div>

<div class="card lehenga">
<img src="lehenga.jpg"
onclick="openModal(this.src)">
<h3>Royal Lehenga</h3>
<div class="price">₹4999</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">
Order
</a>
</div>

<div class="card kurti">
<img src="kurti.jpg"
onclick="openModal(this.src)">
<h3>Daily Kurti</h3>
<div class="price">₹999</div>
<a class="whatsapp"
href="https://wa.me/919420873535"
target="_blank">
Order
</a>
</div>

</div>

<!-- MODAL -->

<div id="modal" class="modal">

<span class="close"
onclick="closeModal()">&times;</span>

<img class="modal-content"
id="modal-img">

</div>

<!-- FLOAT WHATSAPP -->

<a class="float-whatsapp"
href="https://wa.me/919420873535"
target="_blank">

WhatsApp

</a>

<!-- FOOTER -->

<div class="footer">

© 2026 GeetaChaudhari

</div>

</body>

</html>
