<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop | GeetaChaudhari</title>

<style>

body {
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#FFF5E1;
}

/* MENU */

.menu {
background:#D4AF37;
text-align:center;
padding:15px;
}

.menu a {
margin:0 20px;
text-decoration:none;
color:black;
font-weight:bold;
}

/* PAGE TITLE */

.page-title {
text-align:center;
padding:30px 20px 10px;
}

.page-title h1 {
color:#800000;
}

/* PRODUCTS */

.products {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
}

.card {
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
position:relative;
}

.card img {
width:100%;
height:320px;
object-fit:cover;
border-radius:8px;
}

.new-tag {
position:absolute;
top:10px;
left:10px;
background:#800000;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.price {
font-weight:bold;
margin-top:5px;
}

.product-code {
font-size:13px;
color:#800000;
margin-top:5px;
}

/* ADD CART */

.add-cart {
background:#800000;
color:white;
padding:10px 15px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

/* CART ICON */

.cart-icon {
position:fixed;
top:20px;
right:20px;
background:#800000;
color:white;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

/* CART PANEL */

.cart-panel {
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:white;
box-shadow:-4px 0 10px rgba(0,0,0,0.3);
padding:20px;
transition:0.3s;
overflow-y:auto;
}

.cart-panel.open {
right:0;
}

.cart-item {
border-bottom:1px solid #ddd;
padding:10px 0;
}

.remove-btn {
background:red;
color:white;
border:none;
padding:5px 8px;
border-radius:4px;
cursor:pointer;
margin-top:5px;
}

.total {
font-weight:bold;
margin-top:15px;
}

/* CHECKOUT BUTTON */

.checkout-btn {
display:block;
background:#800000;
color:white;
padding:12px;
text-align:center;
margin-top:15px;
border-radius:6px;
text-decoration:none;
}

/* FLOAT WHATSAPP */

.float-whatsapp {
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

.footer {
background:#800000;
color:white;
text-align:center;
padding:15px;
}

</style>

<script>

/* CART STORAGE */

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* ADD TO CART */

function addToCart(name, price) {

cart.push({name, price});

localStorage.setItem("cart", JSON.stringify(cart));

renderCart();

}

/* REMOVE */

function removeItem(index) {

cart.splice(index,1);

localStorage.setItem("cart", JSON.stringify(cart));

renderCart();

}

/* RENDER */

function renderCart() {

let cartList = document.getElementById("cart-items");

let total = 0;

cartList.innerHTML="";

cart.forEach((item,index)=>{

let div=document.createElement("div");

div.className="cart-item";

div.innerHTML=`

<b>${item.name}</b><br>

₹${item.price}

<br>

<button class="remove-btn"

onclick="removeItem(${index})">

Remove

</button>

`;

cartList.appendChild(div);

total += item.price;

});

document.getElementById("total")

.innerText="Total: ₹"+total;

}

/* TOGGLE */

function toggleCart() {

document.getElementById("cart-panel")

.classList.toggle("open");

}

window.onload = renderCart;

</script>

</head>

<body>

<!-- MENU -->

<div class="menu">

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>

</div>

<p>Browse our handcrafted ethnic wear</p>

</div>

Cart 🛒

</div>

<div class="card">

</div>

Add to Cart

</div>

<div class="card">

<img src="lehenga.jpg">

<h3>Royal Lehenga</h3>

<div class="product-code">

Code: GC-LEH-003

</div>

<button class="add-cart"

onclick="addToCart('Royal Lehenga',4999)">

Add to Cart

</button>

</div>

<div class="card">

<img src="kurti.jpg">

<div class="product-code">

Code: GC-KUR-004

</div>

<button class="add-cart"

Add to Cart

</div>

<!-- CART PANEL -->

<div id="cart-panel"

class="cart-panel">

<h2>Your Cart</h2>

<!-- CONNECTED CHECKOUT -->

<a href="checkout.html"

Proceed to Checkout

</a>

</div>

<!-- FLOAT WHATSAPP -->

<a class="float-whatsapp"

href="https://wa.me/919420873535"

<!-- FOOTER -->

<div class="footer">

© 2026 GeetaChaudhari

</div>

</body>

</html>
